apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: next-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 
    targetRevision: main
    path: k8s/base
    helm:
      valueFiles:
        - ../envs/dev-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true