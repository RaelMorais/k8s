apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: next-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RaelMorais/k8s.git
    targetRevision: master
    path: k8s/base
    helm:
      valueFiles:
        - ../envs/prod-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true